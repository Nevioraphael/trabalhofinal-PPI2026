<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4" style="width: 300px;">
        <h3 class="text-center">Login</h3>
        <input id="user" class="form-control mb-2" placeholder="Usuário">
        <input id="pass" type="password" class="form-control mb-2" placeholder="Senha">
        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
        <p id="erro" class="text-danger mt-2"></p>
    </div>

    <script>
        function login() {
            const usuario = user.value;
            const senha = pass.value;

            if (!usuario || !senha) {
                erro.innerText = 'Preencha todos os campos';
                return;
            }

            if (usuario === 'admin' && senha === '123') {
                window.location.href = 'index.html';
            } else {
                erro.innerText = 'Login inválido';
            }
        }
    </script>
</body>
</html>
