<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Plataforma de Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h1 class="mb-4">🏠 Plataforma de Imóveis</h1>

    <div class="row">
        <div class="col-md-6">
            <h3>Cadastro de Pessoa</h3>
            <input id="cpf" placeholder="CPF" class="form-control mb-2" oninput="formatCPF(this)">
            <input id="nome" placeholder="Nome" class="form-control mb-2">
            <input id="email" placeholder="Email" class="form-control mb-2">
            <button class="btn btn-primary" onclick="addPessoa()">Cadastrar</button>
        </div>

        <div class="col-md-6">
            <h3>Cadastro de Imóvel</h3>
            <input id="titulo" placeholder="Título" class="form-control mb-2">
            <input id="tipo" placeholder="Tipo" class="form-control mb-2">
            <input id="valor" placeholder="Valor (R$)" class="form-control mb-2" oninput="formatValor(this)">
            <input id="cpf_imovel" placeholder="CPF do interessado" class="form-control mb-2" oninput="formatCPF(this)">
            <button class="btn btn-success" onclick="addImovel()">Cadastrar</button>
        </div>
    </div>

    <hr>

    <h3>Lista de Pessoas</h3>
    <table class="table table-striped" id="tabelaPessoas">
        <thead>
            <tr>
                <th>CPF</th>
                <th>Nome</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Lista de Imóveis</h3>
    <table class="table table-striped" id="tabelaImoveis">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Tipo</th>
                <th>Valor</th>
                <th>CPF</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h4 id="msg" class="mt-3 text-danger"></h4>

    <script>
        // ================= VALIDAÇÕES =================
        function validarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            return cpf.length === 11;
        }

        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validarValor(valor) {
            return !isNaN(valor) && Number(valor) > 0;
        }

        // ================= FORMATAÇÕES =================
        function formatCPF(input) {
            let v = input.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            input.value = v;
        }

        function formatValor(input) {
            let v = input.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2) + '';
            v = v.replace('.', ',');
            input.value = 'R$ ' + v;
        }

        // ================= CARREGAMENTO =================
        window.onload = () => {
            carregarPessoas();
            carregarImoveis();
        };

        function carregarPessoas() {
            fetch('http://localhost:3000/pessoas')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector('#tabelaPessoas tbody');
                    tbody.innerHTML = '';
                    data.forEach(p => {
                        tbody.innerHTML += `<tr><td>${p.pes_cpf}</td><td>${p.pes_nome}</td><td>${p.pes_email}</td></tr>`;
                    });
                });
        }

        function carregarImoveis() {
            fetch('http://localhost:3000/imoveis')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector('#tabelaImoveis tbody');
                    tbody.innerHTML = '';
                    data.forEach(i => {
                        tbody.innerHTML += `<tr><td>${i.imo_id}</td><td>${i.imo_titulo}</td><td>${i.imo_tipo}</td><td>${i.imo_valor}</td><td>${i.pes_cpf || '-'}</td></tr>`;
                    });
                });
        }

        // ================= AÇÕES =================
        function addPessoa() {
            let cpfLimpo = cpf.value.replace(/\D/g, ''); // remove pontos e traço

            const data = {
                pes_cpf: cpfLimpo,
                pes_nome: nome.value,
                pes_email: email.value
            };

            if (!validarCPF(cpfLimpo)) {
                msg.innerText = 'CPF inválido';
                msg.className = 'text-danger';
                return;
            }

            if (!data.pes_nome) {
                msg.innerText = 'Nome obrigatório';
                msg.className = 'text-danger';
                return;
            }

            if (!validarEmail(data.pes_email)) {
                msg.innerText = 'Email inválido';
                msg.className = 'text-danger';
                return;
            }

            fetch('http://localhost:3000/pessoas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(r => {
                    // ✅ MENSAGEM DE SUCESSO
                    msg.innerText = '✅ Pessoa cadastrada com sucesso!';
                    msg.className = 'text-success';

                    // limpa campos
                    cpf.value = '';
                    nome.value = '';
                    email.value = '';

                    carregarPessoas();
                })
                .catch(() => {
                    msg.innerText = 'Erro ao cadastrar pessoa';
                    msg.className = 'text-danger';
                });
        }
        function addImovel() {
            let valorNumerico = valor.value.replace(/[^0-9,]/g, '').replace(',', '.');

            const data = {
                imo_titulo: titulo.value,
                imo_tipo: tipo.value,
                imo_valor: valorNumerico,
                pes_cpf: cpf_imovel.value
            };

            if (!data.imo_titulo) return alert('Título obrigatório');
            if (!validarValor(valorNumerico)) return alert('Valor inválido');
            if (!validarCPF(data.pes_cpf)) return alert('CPF inválido');

            fetch('http://localhost:3000/imoveis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(r => {
                    alert(r.mensagem);
                    carregarImoveis();
                });
        }
    </script>

</body>

</html>
